<!doctype html>
<html lang="en">
  <head></head>
  <body>
    <ul>
      <li>철수</li>
      <li>지민</li>
      <li>영희</li>
    </ul>

    <script>
      const list = document.getElementsByTagName('li');
      for (let i = 0; i < list; lnegth++) {
        list[i].remove();
        // list가 HTML collection : 요소 하나 지우면 자동으로 뒤 요소가 앞당겨짐(인덱스가)
      }
      // 1. 배열로 복사해서 안정적으로 사용하기
      const items = Array.from(document.getElementsByTagName('li'));
      items.forEach((li) => {
        li.remove;
      });

      // 2. 뒤에서부터 반복하기 - 뒤에서부터 삭제시 이미 지난 인덱스이므로 영향 받지 않음

      for (let i = list.length - 1; i >= 0; i--) {
        list[i].remove();
      }

      // 3. NodeList - 처음 선택된 시점의 상태만 유지, 아무리 새로 추가해도 내용 반영 안됨.
      list.forEach((li) => li.remove());
    </script>
  </body>
</html>
