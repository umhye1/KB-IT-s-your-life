<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>안녕하세요</h1>
    <p>이것은 문단입니다.</p>

    <!-- --------- -->

    <body>
      <div>
        <p>Hello</p>
      </div>
    </body>

    <!-- --------- -->

    <button id="btn">눌러보세요</button>
    <p id="text">안녕하세요</p>

    <script>
      const button = document.getElementById('btn');
      const text = document.getElementById('text');

      // HTML 파일을 수정하는 것이 아니라 브라우저 메모리 상의 DOM 객체를 실시간으로 조작함
      // DOM : 자바스크립트가 조작할 수 있도록 객체화 -> 동적인 반응 구현 가능 도구. 문서 객체 구조
      // 브라우저에서 제공 . 자바스크립으틔 일부가 아니라 웹 환경에서 제공하는 것임
      button.addEventListener('click', () => {
        text.textContent = 'DOM을 통해 바뀌었어요!';
      });
    </script>
  </body>
</html>
