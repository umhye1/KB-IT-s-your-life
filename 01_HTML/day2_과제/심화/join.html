<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>회원가입</title>
    <style>
      fieldset {
        width: 500px;
      }
      td:first-child {
        text-align: center;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <form>
      <fieldset>
        <legend>회원가입</legend>
        <table>
          <tr>
            <td><label for="userId">사용자 ID</label></td>
            <td><input id="userId" type="text" /></td>
          </tr>

          <tr>
            <td><label for="password">비밀번호</label></td>
            <td><input id="password" type="password" /></td>
          </tr>

          <tr>
            <td><label for="password">비밀번호 확인</label></td>
            <td><input id="password_check" type="password_check" /></td>
          </tr>

          <tr>
            <td><label for="name">이름</label></td>
            <td><input id="name" type="text" /></td>
          </tr>

          <tr>
            <td><label for="gender">성별</label></td>
            <td>
              <input id="man" type="radio" value="m" />
              <label for="man">남</label>
              <input id="woman" type="radio" value="w" />
              <label for="woman">여</label>
            </td>
          </tr>

          <tr>
            <td><label for="hobby">취미</label></td>
            <td>
              <input id="soccer" type="checkbox" />
              <label for="soccer">축구</label>
              <input id="baseball" type="checkbox" />
              <label for="baseball">야구</label>
              <input id="volleyball" type="checkbox" />
              <label for="volleyball">배구</label>
              <input id="basketball" type="checkbox" />
              <label for="basketball">농구</label>
            </td>
          </tr>

          <tr>
            <td><label for="email">email</label></td>
            <td><input id="email" type="email" /></td>
          </tr>

          <tr>
            <td><label for="role">역할</label></td>
            <td>
              <select>
                <option>ADMIN</option>
                <option>관리자</option>
                <option>일반회원</option>
              </select>
            </td>
          </tr>
        </table>
        <input type="submit" value="확인" />
        <input type="reset" value="다시쓰기" />
      </fieldset>
    </form>
  </body>
</html>
