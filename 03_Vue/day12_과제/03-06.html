<!-- 체크 박스를 체크하면 yes, 체크하지 않으면 no 값을 가지도록 다음 코드를 완성하세요. -->

<div id="app">
  위의 내용에 동의하십니까?
  <input type="checkbox" v-model="agree" true-value="yes" false-value="no" />
  <hr />

  <span>선택된 값 : {{agree}}</span>
</div>

<script src="https://unpkg.com/vue"></script>
<script>
  let vm = Vue.createApp({
    name: 'App',
    data() {
      return {
        agree: 'no',
      };
    },
  }).mount('#app');
</script>
