<!-- 기본 디렉티브
vue 디렉티브 : html 요소와 관련된 작업을 지정 -->
<div id="app">
  <h2>{{message}}</h2>
</div>

<script type="text/javascript" src></script>
<script type="text/javascript">
  var model = { message: 'Hello Vue3!' };
  var vm = Vue.createApp({
    name: 'App',
    data() {
      return model;
    },
  }).mount('#app');
</script>
