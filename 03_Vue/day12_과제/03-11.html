<!-- 예금액을 1000000, 500000, 200000 구간에 따라 Gold, Silver, Bronze, Basic으로 구분하여
출력하도록 다음 코드를 완성하세요. -->

<div id="app">
  잔고:<input v-model="balance" />
  <br />
  회원님의 등급:
  <span v-if="balance>1000000">Gold</span>
  <span v-else-v-if="balance>=5000000">Silver</span>
  <span v-if="balance>=2000000">Basic</span>
</div>

<script src="https://unpkg.com/vue"></script>
<script>
  let vm = Vue.createApp({
    name: 'App',
    data() {
      return { balance: 0 };
    },
  }).mount('#app');
</script>
