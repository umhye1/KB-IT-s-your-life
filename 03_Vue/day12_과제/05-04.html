<!-- 인라인 이벤트 핸들러 -->
<div id="app">
  <input type="text" :value="name" @input="(e)=>this.name=e.target.value" />
  <br />
  이름 : <span>{{name}}</span>
</div>

<script src="https://unpkg.com/vue"></script>
<script>
  let vm = Vue.createApp({
    name: 'App',
    data() {
      return {
        name: '',
      };
    },
  }).mount('#app');
</script>
